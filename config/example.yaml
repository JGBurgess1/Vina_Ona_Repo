# Docking configuration
# Receptor and search box parameters for your target protein

receptor: /path/to/receptor.pdbqt

# Search box center (Angstroms) - active site coordinates
center: [15.190, 53.903, 16.917]

# Search box dimensions (Angstroms)
box_size: [20.0, 20.0, 20.0]

# Grid spacing (default: 0.375 Angstroms)
spacing: 0.375

# Scoring function: vina, vinardo, or ad4
scoring_function: vina

# Docking parameters
exhaustiveness: 8       # Monte Carlo runs per ligand (higher = more thorough, slower)
n_poses: 1              # Max poses to generate per ligand
min_rmsd: 1.0           # Min RMSD between poses (Angstroms)
max_evals: 0            # Max evaluations (0 = use heuristics)
energy_range: 3.0       # Max energy difference from best pose (kcal/mol)

# Reproducibility
seed: 42

# Output
write_poses: true       # Write PDBQT pose files for each ligand
output_dir: output/poses
maps_dir: maps
